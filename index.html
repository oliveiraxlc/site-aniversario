<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>para você, Eloísa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07090f;--rose:#c08080;--rose-bright:#e0a8a8;--cream:#f0ebe4;--muted:#7a7a9a}
    html,body{height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Montserrat',sans-serif;cursor:none}
    canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
    .nebula{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0}
    .neb1{width:500px;height:500px;background:radial-gradient(circle,rgba(160,60,80,0.18),transparent 70%);top:-150px;right:-100px;animation:nf 12s ease-in-out infinite}
    .neb2{width:400px;height:400px;background:radial-gradient(circle,rgba(60,60,140,0.14),transparent 70%);bottom:-100px;left:-100px;animation:nf 15s ease-in-out infinite reverse}
    @keyframes nf{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,20px)}}
    .cursor{position:fixed;width:20px;height:20px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);font-size:16px;color:var(--rose-bright);transition:transform 0.1s}
    .center{position:relative;z-index:1;text-align:center;padding:40px 24px;animation:fadeIn 2s ease forwards}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .eyebrow{font-weight:200;font-size:0.58rem;letter-spacing:0.5em;color:var(--muted);text-transform:uppercase;margin-bottom:28px}
    .title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(3rem,13vw,5.5rem);color:var(--cream);line-height:1.05}
    .title em{font-style:italic;color:var(--rose-bright);display:block;font-size:1.15em}
    .divider{width:40px;height:1px;background:rgba(192,128,128,0.35);margin:28px auto;position:relative}
    .divider::before{content:'✦';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--bg);color:var(--rose);font-size:0.55rem;padding:0 6px}
    .pulse-phrase{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.95rem,4vw,1.25rem);color:var(--rose-bright);margin-bottom:52px;animation:pulseFade 3s ease-in-out infinite}
    @keyframes pulseFade{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
    .btn{display:inline-block;font-weight:300;font-size:0.62rem;letter-spacing:0.42em;text-transform:uppercase;color:var(--cream);border:1px solid rgba(192,128,128,0.38);padding:16px 44px;border-radius:60px;cursor:none;background:transparent;transition:all 0.4s ease;position:relative;overflow:hidden}
    .btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(192,128,128,0.2),transparent);opacity:0;transition:opacity 0.4s}
    .btn:hover::before{opacity:1}
    .btn:hover{border-color:var(--rose-bright);color:var(--rose-bright);transform:scale(1.03)}
    .btn:active{transform:scale(0.97)}
    .btn-text{position:relative;z-index:1}
    .float-heart{position:fixed;pointer-events:none;z-index:9998;animation:floatUp 1.4s ease forwards}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(0.5) rotate(-10deg)}50%{opacity:0.8;transform:translateY(-60px) scale(1.1) rotate(10deg)}100%{opacity:0;transform:translateY(-130px) scale(0.7) rotate(-5deg)}}
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="nebula neb1"></div>
  <div class="nebula neb2"></div>
  <div class="cursor" id="cursor">♡</div>
  <div class="center">
    <p class="eyebrow">para você, Eloísa</p>
    <h1 class="title">nosso<em>amor</em></h1>
    <div class="divider"></div>
    <p class="pulse-phrase">"você foi a melhor surpresa da minha vida"</p>
    <button class="btn" onclick="window.location.href='home.html'"><span class="btn-text">abrir</span></button>
  </div>
  <script>
    const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
    let W,H,stars=[];
    function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
    function init(){stars=[];for(let i=0;i<250;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.1,a:Math.random()*0.6+0.15,da:(Math.random()*0.015+0.003)*(Math.random()>0.5?1:-1)})}
    function draw(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{s.a+=s.da;if(s.a>0.9||s.a<0.08)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill()});requestAnimationFrame(draw)}
    window.addEventListener('resize',()=>{resize();init()});resize();init();draw();
    for(let i=0;i<5;i++){const d=document.createElement('div');d.style.cssText=`position:fixed;height:1px;border-radius:1px;background:white;box-shadow:0 0 6px 1px rgba(255,255,255,0.7);transform:rotate(30deg);opacity:0;z-index:0;width:${60+Math.random()*80}px;left:${Math.random()*70}vw;top:${Math.random()*50}vh;animation:shoot ${3+Math.random()*5}s ${Math.random()*12}s linear infinite;`;document.body.appendChild(d)}
    const st=document.createElement('style');st.textContent='@keyframes shoot{0%{opacity:0;transform:rotate(30deg) translateX(0)}5%{opacity:1}70%{opacity:0.6}100%{opacity:0;transform:rotate(30deg) translateX(350px)}}';document.head.appendChild(st);
    const cursor=document.getElementById('cursor');
    document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px'});
    const hs=['♡','♥','❤','💕','✦'];
    document.addEventListener('click',e=>{
      for(let i=0;i<5;i++){const h=document.createElement('div');h.className='float-heart';h.textContent=hs[Math.floor(Math.random()*hs.length)];h.style.left=(e.clientX+(Math.random()-0.5)*40)+'px';h.style.top=e.clientY+'px';h.style.color=`hsl(${340+Math.random()*30},70%,${70+Math.random()*15}%)`;h.style.fontSize=(0.8+Math.random()*0.8)+'rem';h.style.animationDuration=(1+Math.random()*0.6)+'s';document.body.appendChild(h);setTimeout(()=>h.remove(),2000)}
    });
  </script>
</body>
</html>
